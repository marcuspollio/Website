{{- /* SVG icon partial:

  - Get bundled SVG file and rely on sprite technique to lower DOM bloat.
  - Note: SVG files must have named fragment ID attribute on <svg> root to work on all web browsers.
*/ -}}


{{- $name := lower . -}}

{{- with resources.Get (printf "svg/%s.svg" $name) -}}
  <svg class="icon-{{ $name }}"
    aria-hidden="true"
    focusable="false">
    <use href="{{ .RelPermalink }}#{{ $name }}"></use>
  </svg>
{{- else -}}
  {{- warnf "SVG icon not found: %s" ($name | default "unknown") -}}
{{- end -}}
