{{- $ancestors := where .Ancestors "IsHome" "!=" true -}}

<nav class="breadcrumb">
  <ol>
    {{- range $ancestors.Reverse -}}
      <li>
        <a href="{{ .RelPermalink }}">{{- .LinkTitle -}}</a>
      </li>
    {{- end -}}
    <li>
      <a class="active" href="{{ .RelPermalink }}" aria-current="page">{{- .LinkTitle -}}</a>
    </li>
  </ol>
</nav>
