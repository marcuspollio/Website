# Sample workflow for building and deploying a Hugo project to GitHub Pages
# https://gohugo.io/host-and-deploy/host-on-github-pages

name: Hugo main (build main, and deploy to pages branch with cache)

on:
  push:
    # Ignore root files only changes (e.g README).
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - ".editorconfig"
      - ".gitignore"
      - ".vscode/settings.json"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/ISSUE_TEMPLATE"
    branches:
      - main

  # Run after other workflows with a trigger job.
  repository_dispatch:
    types: [trigger-hugo-pages]

  # Allow to run workflow manually from the Actions tab.
  workflow_dispatch:

# Sets permissions to allow to write to branches (e.g. pages)
permissions:
  contents: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs to allow these deployments to complete.
concurrency:
  group: "hugo-main"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.158.0
      HUGO_ENVIRONMENT: production
      TZ: Europe/Berlin

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Create dirs for executables and cache
        run: |
          mkdir -p "${HOME}/.local"
          mkdir -p "${{ runner.temp }}/hugo_cache"
          mkdir -p "resources/_gen"

      - name: Cache Hugo binary
        id: cache-hugo
        uses: actions/cache@v5
        with:
          path: ~/.local/hugo
          key: hugo-bin-${{ env.HUGO_VERSION }}

      - name: Add Hugo to PATH
        run: echo "${HOME}/.local/hugo" >> $GITHUB_PATH

      - name: Install Hugo (if cache miss)
        if: steps.cache-hugo.outputs.cache-hit != 'true'
        run: |
          curl -sLJO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_${HUGO_VERSION}_linux-amd64.tar.gz"
          rm "hugo_${HUGO_VERSION}_linux-amd64.tar.gz"

      - name: Verify installations
        run: |
          echo "Hugo: $(hugo version)"

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config core.quotepath false

      - name: Cache Restore
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ runner.temp }}/hugo_cache
            resources/_gen
          key: hugo-${{ env.HUGO_VERSION }}-${{ hashFiles('content/**', 'layouts/**', 'assets/**', 'static/**', 'config/**', 'themes/**') }}
          restore-keys:
            hugo-${{ env.HUGO_VERSION }}-

      - name: Set BASE_URL
        env:
          BASE_URL_SECRET: ${{ secrets.BASE_URL }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          BASE="${BASE_URL_SECRET:-https://${REPO_OWNER}.github.io/${REPO_NAME}/}"
          BASE="${BASE%/}/"
          echo "BASE_URL=${BASE}" >> $GITHUB_ENV

      - name: Build Hugo project
        run: |
          hugo \
            --gc \
            --minify \
            --enableGitInfo \
            --environment "$HUGO_ENVIRONMENT" \
            --baseURL "$BASE_URL" \
            --cacheDir "${{ runner.temp }}/hugo_cache"


      - name: Commit message
        id: commit-message
        run: |
          message="${{ github.event.head_commit.message || github.event.inputs.message }}"
          message=${message:-"Deploy Hugo main project to pages branch"}
          message=$(echo "$message" | tr '\n\r' ' ' | sed "s/['\"]/ /g")
          echo "message=$message" >> $GITHUB_OUTPUT

      - name: Deploy to pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: pages
          publish_dir: ./public
          destination_dir: .
          keep_files: true
          commit_message: "${{ steps.commit-message.outputs.message }}"

      - name: Cache Save
        id: cache-save
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ runner.temp }}/hugo_cache
            resources/_gen
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}